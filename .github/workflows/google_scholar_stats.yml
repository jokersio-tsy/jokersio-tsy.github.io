name: Update Google Scholar Stats

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  update-scholar-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r google_scholar_crawler/requirements.txt

      - name: Fetch Google Scholar data
        env:
          GOOGLE_SCHOLAR_ID: 2UwjVasAAAAJ
        run: |
          cd google_scholar_crawler
          python main.py

      - name: Publish stats branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd google_scholar_crawler/results
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gs_data.json gs_data_shieldsio.json
          git commit -m "Update Google Scholar stats" || exit 0
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:google-scholar-stats --force
