<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shi-Yu Tian | Full Publications</title>
  <meta
    name="description"
    content="Full publication list of Shi-Yu Tian."
  >
  <style>
    :root {
      --bg: #ffffff;
      --ink: #30363d;
      --muted: #5f6872;
      --line: #e6e8eb;
      --accent: #224b8d;
      --body: "Trebuchet MS", "Aptos", "Segoe UI", Helvetica, Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: var(--body);
      font-size: 15px;
      line-height: 1.55;
      background: var(--bg);
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      color: #142d55;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .shell {
      width: min(1120px, calc(100% - 2rem));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid var(--line);
    }

    .topbar-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      padding: 0.55rem 0;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0;
      color: var(--ink);
      font-size: 1rem;
      font-weight: 700;
    }

    .brand-mark {
      display: none;
    }

    .nav {
      display: flex;
      gap: 1.05rem;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.93rem;
    }

    .nav a {
      color: inherit;
    }

    .nav a:hover {
      color: var(--accent);
    }

    .hero {
      padding: 2rem 0 1.25rem;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      display: none;
    }

    h1, h2, h3 { margin: 0; }

    h1 {
      font-size: 1.65rem;
      line-height: 1.2;
      letter-spacing: 0;
      margin-bottom: 0.45rem;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      max-width: 720px;
      font-size: 1rem;
    }

    .section {
      padding: 1.35rem 0 1.65rem;
      border-bottom: 1px solid var(--line);
    }

    .section-card {
      padding: 0;
      border: 0;
      background: transparent;
    }

    .section-title {
      font-size: 1.35rem;
      line-height: 1.2;
      margin-bottom: 0.8rem;
    }

    .pub-list {
      margin: 0;
      padding-left: 1.25rem;
    }

    .pub-list li + li {
      margin-top: 1rem;
    }

    .pub-title {
      font-weight: 700;
      color: var(--ink);
      line-height: 1.35;
    }

    .pub-authors,
    .pub-venue,
    .pub-links {
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.45;
    }

    .venue-abbr {
      font-weight: 700;
      color: var(--accent);
    }

    .venue-oral {
      color: #a3232a;
      font-weight: 700;
    }

    .pub-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin: 0;
    }

    .pub-actions {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.4rem 0.7rem;
      margin-top: 0.35rem;
    }

    .rating-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 1.55rem;
      padding: 0.12rem 0.5rem;
      border-radius: 999px;
      font-size: 0.76rem;
      font-weight: 700;
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--ink);
    }

    .rating-pill.ccf {
      background: rgba(216, 154, 43, 0.16);
      color: #8a5a09;
      border-color: rgba(216, 154, 43, 0.18);
    }

    .rating-pill.caai {
      background: rgba(216, 154, 43, 0.16);
      color: #8a5a09;
      border-color: rgba(216, 154, 43, 0.18);
    }

    .pub-links a {
      color: var(--accent);
    }

    .pub-links a + a {
      margin-left: 0.5em;
    }

    .pub-links a + a::before {
      content: "· ";
      color: var(--muted);
      text-decoration: none;
      display: inline-block;
      margin-right: 0.15em;
    }

    .footer {
      padding: 1rem 0 3rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 640px) {
      .topbar-inner {
        flex-direction: column;
        align-items: start;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="shell topbar-inner">
      <a class="brand" href="./index.html">
        <span class="brand-mark">ST</span>
        <span>Shi-Yu Tian</span>
      </a>
      <nav class="nav">
        <a href="./index.html">Home</a>
        <a href="#conference">Conference</a>
        <a href="#journal">Journal</a>
        <a href="#preprint">Preprints</a>
      </nav>
    </div>
  </header>

  <main class="shell">
    <section class="hero">
      <div class="eyebrow">Publications</div>
      <h1>📝 Full Publications</h1>
      <p>
        A text-only publication list. * denotes co-first authorship.
      </p>
    </section>

    <section class="section" id="conference">
      <div class="section-card">
        <h2 class="section-title">🎤 Conference Papers</h2>
        <ol class="pub-list" id="conference-list"></ol>
      </div>
    </section>

    <section class="section" id="journal">
      <div class="section-card">
        <h2 class="section-title">📚 Journal Papers</h2>
        <ol class="pub-list" id="journal-list"></ol>
      </div>
    </section>

    <section class="section" id="preprint">
      <div class="section-card">
        <h2 class="section-title">🧪 Preprints and Workshop Papers</h2>
        <ol class="pub-list" id="preprint-list"></ol>
      </div>
    </section>

    <footer class="footer">
      Page updated on 2026.05.
    </footer>
  </main>
  <script src="./assets/data/publications.js?v=20260614-learnability-arxiv"></script>
  <script src="./assets/js/site-render.js?v=20260618-pub-actions"></script>
</body>
</html>
